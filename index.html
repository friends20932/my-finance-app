<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有帳本總覽 | Premium Finance Tracker</title>
    <!-- Security Lock Script -->
    <script src="lock.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="header-content" style="flex-direction: row; justify-content: space-between; align-items: center;">
                <h1 id="main-title">跨帳本財富總覽</h1>
                <div class="header-right" style="display: flex; gap: 1rem; align-items: center;">
                    <button id="privacy-toggle" class="icon-btn" title="顯示/隱藏餘額" style="background: rgba(255,255,255,0.2);">
                        <i class="fas fa-eye"></i>
                    </button>
                    <a href="app.html" class="btn-primary" style="text-decoration: none;">
                        <i class="fas fa-arrow-left"></i> 返回記帳本
                    </a>
                </div>
            </div>
        </header>

        <!-- Grand Total Widget -->
        <div class="widget-grid" style="margin-bottom: 2rem;">
            <div class="draggable-widget balance-card glass full-width" style="padding: 3rem;">
                <span class="label">所有帳本總淨值</span>
                <h2 id="grand-total-balance" class="amount">$ 0.00</h2>
                <div class="stats-row" style="justify-content: center; gap: 4rem;">
                    <div class="stat income">
                        <i class="fas fa-arrow-up"></i>
                        <div>
                            <span class="small-label">總累積收入</span>
                            <p id="grand-total-income" class="amount">$ 0.00</p>
                        </div>
                    </div>
                    <div class="stat expense">
                        <i class="fas fa-arrow-down"></i>
                        <div>
                            <span class="small-label">總累積支出</span>
                            <p id="grand-total-expense" class="amount">$ 0.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="ledgers-overview-container" class="widget-grid">
            <!-- Ledgers will be rendered here -->
        </div>
    </div>

    <script src="overview.js"></script>
</body>
</html>
